name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  generate-matrix:
    name: Evaluate flake & generate package list
    runs-on: ubuntu-latest
    outputs:
      packages: ${{ steps.matrix.outputs.packages }}
      has-packages: ${{ steps.matrix.outputs.has-packages }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true
      - run: nix flake show path:.
      - run: nix flake check path:. --no-build
      - id: matrix
        name: Collect buildable packages
        # On pull_request events, only build packages whose pkgs/<name>/ directory
        # was touched in the PR. On push/dispatch, build everything and then build
        # hardware-tools in the same runner to validate the bundle without starting
        # from another empty Nix store.
        run: |
          all_packages=$(nix eval --json ".#packages.x86_64-linux" --apply '
            pkgs:
            let
              allNames = builtins.attrNames pkgs;

              updateNames = builtins.filter (n:
                let p = pkgs.${n}; in
                p ? passthru && p.passthru ? nixchipCI && p.passthru.nixchipCI
              ) allNames;

              # Use pkg.name (pname+version) so that parametrized siblings built from
              # the same template file (e.g. pulp-riscv-dbg vs pulp-snitch, distinct
              # pnames) are kept separate, while true aliases (chisel = chisel7, same
              # derivation -> same name) are collapsed to the versioned attr name.
              byDrv   = builtins.groupBy (n: pkgs.${n}.name) updateNames;
              slotRev = n: builtins.match ".*-[0-9]+$" n != null;
              hasVer  = n: builtins.match ".*[0-9]$"   n != null;
              pickBest = ns:
                let slot = builtins.filter slotRev ns;
                    vers = builtins.filter hasVer  ns;
                in if slot != [] then builtins.head slot
                   else if vers != [] then builtins.head vers
                   else builtins.head ns;
              deduped = builtins.map pickBest (builtins.attrValues byDrv);

            in
            builtins.sort builtins.lessThan deduped
          ')

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            changed=$(git diff --name-only ${{ github.event.pull_request.base.sha }}...${{ github.sha }} \
              | awk -F/ '/^pkgs\// { print $2 }' \
              | sort -u \
              | jq -R . \
              | jq -sc .)
            packages=$(echo "$all_packages" | jq -c --argjson c "$changed" \
              '[.[] | select(. as $p | $c | any(. == $p))]')
          else
            packages=$(echo "$all_packages" | jq -c '. + ["hardware-tools"]')
          fi

          if [ "$(echo "$packages" | jq 'length')" = "0" ]; then
            echo "has-packages=false" >> "$GITHUB_OUTPUT"
            echo "packages=[]" >> "$GITHUB_OUTPUT"
          else
            echo "has-packages=true" >> "$GITHUB_OUTPUT"
            echo "packages=$packages" >> "$GITHUB_OUTPUT"
          fi

  build:
    name: Build selected packages
    runs-on: ubuntu-latest
    timeout-minutes: 360
    needs: generate-matrix
    if: needs.generate-matrix.outputs.has-packages == 'true'
    outputs:
      results: ${{ steps.build.outputs.results }}
      has-failures: ${{ steps.build.outputs.has-failures }}
    steps:
      - uses: actions/checkout@v7
      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true
      - id: build
        name: Build
        env:
          PACKAGES: ${{ needs.generate-matrix.outputs.packages }}
        run: |
          mapfile -t packages < <(jq -r '.[]' <<< "$PACKAGES")
          scripts/ci-build.sh x86_64-linux "${packages[@]}"

  report:
    name: ${{ matrix.package }}
    runs-on: ubuntu-latest
    needs:
      - generate-matrix
      - build
    if: always() && needs.generate-matrix.outputs.has-packages == 'true'
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.build.outputs.results || '[]') }}
    steps:
      - name: Report package result
        run: |
          if [ "${{ matrix.status }}" = "success" ]; then
            echo "${{ matrix.package }} built successfully."
          else
            echo "::error title=${{ matrix.package }} failed::See the 'Build selected packages' job logs for the build failure."
            exit 1
          fi
