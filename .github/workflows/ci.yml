name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  generate-matrix:
    name: Evaluate flake & generate package list
    runs-on: ubuntu-latest
    outputs:
      packages: ${{ steps.matrix.outputs.packages }}
      has-packages: ${{ steps.matrix.outputs.has-packages }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true
      - run: nix flake show path:.
      - run: nix flake check path:. --no-build
      - id: matrix
        name: Collect buildable packages
        # Default CI builds branch-tracking package attrs only and skips heavyweight
        # LLVM/GCC toolchains. Pull requests additionally build exact attrs whose
        # package version or source pin changed, including pinned release slots.
        run: |
          package_meta() {
            nix eval --json "$1#packages.x86_64-linux" --apply '
              pkgs:
              let
                allNames = builtins.attrNames pkgs;
                isCiPackage = n:
                  let p = pkgs.${n}; in
                  p ? passthru && p.passthru ? nixchipCI && p.passthru.nixchipCI;
                isSkipped = n: builtins.match ".*(llvm|LLVM|gcc|GCC|ggc|GGC).*" n != null;
                isPinned = n:
                  let version = pkgs.${n}.version or "";
                  in builtins.match ".*unstable.*" version == null;
                mk = n:
                  let
                    p = pkgs.${n};
                    src = p.src or {};
                  in
                  {
                    name = n;
                    version = p.version or "";
                    pname = p.pname or n;
                    source = {
                      rev = src.rev or "";
                      hash = src.outputHash or (src.hash or "");
                      url = src.url or "";
                    };
                    default = !isPinned n;
                  };
              in
              builtins.sort (a: b: builtins.lessThan a.name b.name)
                (builtins.map mk (builtins.filter (n: isCiPackage n && !isSkipped n) allNames))
            '
          }

          current_meta=$(package_meta path:.)
          default_packages=$(echo "$current_meta" | jq -c '[.[] | select(.default) | .name]')

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base_meta=$(package_meta "github:${{ github.repository }}/${{ github.event.pull_request.base.sha }}")
            metadata_changed=$(jq -n -c \
              --argjson base "$base_meta" \
              --argjson current "$current_meta" '
                ($base | map({key: .name, value: { version: .version, source: .source }}) | from_entries) as $basePackages |
                $current
                | map(select(
                    .version != ($basePackages[.name].version // null)
                    or .source != ($basePackages[.name].source // null)
                  ) | .name)
              ')
            changed_dirs=$(git diff --name-only ${{ github.event.pull_request.base.sha }}...${{ github.sha }} \
              | awk -F/ '/^pkgs\// { print $2 }' \
              | sort -u \
              | jq -R . \
              | jq -sc .)
            touched_default=$(echo "$default_packages" | jq -c --argjson c "$changed_dirs" \
              '[.[] | select(. as $p | $c | any(. == $p))]')
            packages=$(jq -n -c \
              --argjson touched "$touched_default" \
              --argjson changed "$metadata_changed" \
              '($touched + $changed) | unique')
          else
            packages="$default_packages"
          fi

          if [ "$(echo "$packages" | jq 'length')" = "0" ]; then
            echo "has-packages=false" >> "$GITHUB_OUTPUT"
            echo "packages=[]" >> "$GITHUB_OUTPUT"
          else
            echo "has-packages=true" >> "$GITHUB_OUTPUT"
            echo "packages=$packages" >> "$GITHUB_OUTPUT"
          fi

  build:
    name: Build selected packages
    runs-on: ubuntu-latest
    timeout-minutes: 360
    needs: generate-matrix
    if: needs.generate-matrix.outputs.has-packages == 'true'
    outputs:
      results: ${{ steps.build.outputs.results }}
      has-failures: ${{ steps.build.outputs.has-failures }}
    steps:
      - uses: actions/checkout@v7
      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true
      - id: build
        name: Build
        env:
          PACKAGES: ${{ needs.generate-matrix.outputs.packages }}
        run: |
          mapfile -t packages < <(jq -r '.[]' <<< "$PACKAGES")
          scripts/ci-build.sh x86_64-linux "${packages[@]}"
      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: ci-build-logs
          path: ci-logs/
          if-no-files-found: ignore

  report:
    name: ${{ matrix.package }}
    runs-on: ubuntu-latest
    needs:
      - generate-matrix
      - build
    if: always() && needs.generate-matrix.outputs.has-packages == 'true'
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.build.outputs.results || '[]') }}
    steps:
      - name: Report package result
        run: |
          if [ "${{ matrix.status }}" = "success" ]; then
            echo "${{ matrix.package }} built successfully."
          else
            echo "::error title=${{ matrix.package }} failed::See ${{ matrix.log }} in the ci-build-logs artifact."
            exit 1
          fi
