name: Update flake inputs

on:
  schedule:
    - cron: "21 3 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    name: Update flake.lock
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true
      - run: chmod +x scripts/*.sh
      - run: nix flake update
      - run: nix flake check path:. --no-build
      - name: Create or update pull request
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          scripts/open-update-pr.sh \
            update/flake-inputs \
            "Update flake inputs" \
            "${{ github.event.repository.default_branch }}" <<'BODY'
          Automated update of flake inputs via `nix flake update`.

          The workflow evaluates `nix flake check --no-build` before opening this PR.
          BODY
